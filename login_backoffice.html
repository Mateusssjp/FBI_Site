<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FBI — Back Office</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container py-5" style="max-width: 400px;">
        <h3 class="text-center mb-4">Back Office</h3>

        <div id="error" class="alert alert-danger d-none">
            Email ou password incorretos
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input id="email" type="email" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input id="password" type="password" class="form-control">
        </div>

        <button type="button" class="btn btn-dark w-100" onclick="login()">
            Entrar
        </button>
    </div>

    <script>
        function login() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            console.log(email, password); // debug

            if (
                email === "mateusjp270@gmail.com" &&
                password === "#Mateusl23"
            ) {
                window.location.href = "backoffice.html";
            } else {
                document.getElementById("error").classList.remove("d-none");
            }
        }
    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
